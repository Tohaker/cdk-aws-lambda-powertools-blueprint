on: pull_request

jobs:
  checks:
    runs-on: ubuntu-slim
    strategy:
      fail-fast: false
      matrix:
        command:
          - build
          - test
          - lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: npm ci
      - name: Run ${{ matrix.command }}
        run: npm run ${{ matrix.command }}
